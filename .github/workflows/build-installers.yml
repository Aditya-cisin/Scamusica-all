 name: Build Installer (macOS Intel)
 on:
   workflow_dispatch:
 env:
   PROJECT_PATH: .
   APP_VERSION: 1.0.0
 jobs:
   build-macos-intel:
     name: Build macOS Intel DMG
     runs-on: macos-15-intel
     steps:
       - name: Checkout sources
         uses: actions/checkout@v4

       - name: Setup Temurin JDK 17
         uses: actions/setup-java@v4
         with:
           distribution: temurin
           java-version: 17
           cache: maven

#       - name: Build JAR
#         working-directory: ${{ env.PROJECT_PATH }}
#         run: |
#           chmod +x mvnw || true
##           ./mvnw -B -DskipTests clean compile jar:jar
#           ./mvnw -B -DskipTests clean package
#           echo "📦 Target contents after JAR:"
#           ls -lh target
       - name: Build App
         run: |
           chmod +x mvnw || true
           ./mvnw -B -DskipTests clean package

#       - name: Create custom runtime with jlink
#         working-directory: ${{ env.PROJECT_PATH }}
#         run: |
#           ./mvnw -B javafx:jlink
#           echo "📦 Runtime created:"
#           ls -lh target/scamusica-runtime

#       - name: Package into DMG with jpackage
#         working-directory: ${{ env.PROJECT_PATH }}
#         run: |
#           ./mvnw -B jpackage:jpackage
#           echo "📦 DMG created:"
#           ls -lh target/*.dmg

#       - name: Import SSL certificates into bundled JDK
#         working-directory: ${{ env.PROJECT_PATH }}
#         run: |
#           KEYTOOL=target/scamusica-runtime/bin/keytool
#           CACERTS=target/scamusica-runtime/lib/security/cacerts
#           STORE_PASS=changeit  # Default password for cacerts
#           # Api1 fullchain import (if split then loop, else direct)
#           $KEYTOOL -importcert -trustcacerts -keystore $CACERTS -storepass $STORE_PASS -noprompt -alias api1 -file certs/api1_fullchain.crt
#           # Api2 same
#           $KEYTOOL -importcert -trustcacerts -keystore $CACERTS -storepass $STORE_PASS -noprompt -alias api2 -file certs/api2_fullchain.crt
#           # If the fullchain contains multiple certificates and an error occurs, first split it (use csplit as mentioned above) and import each one with a separate alias, like:
#           # $KEYTOOL -importcert ... -alias api1-server -file cert-00
#           # $KEYTOOL -importcert ... -alias api1-intermediate -file cert-01
#           # Etc.
#           echo "✅ Certs imported into cacerts"

       - name: DEBUG target folder (IMPORTANT)
         run: |
           echo "📂 Listing target folder"
           ls -R target

       - name: Inject SSL certs into FINAL app (CRITICAL)
         run: |
           APP_PATH=$(find target -name "*.app" | head -n 1)

           if [ -z "$APP_PATH" ]; then
             echo "❌ ERROR: .app not found"
             exit 1
           fi

           echo "App path: $APP_PATH"

           KEYTOOL=$APP_PATH/Contents/runtime/bin/keytool
           CACERTS=$APP_PATH/Contents/runtime/lib/security/cacerts

           # delete old if exists
           $KEYTOOL -delete -alias api1 -keystore $CACERTS -storepass changeit || true
           $KEYTOOL -delete -alias api2 -keystore $CACERTS -storepass changeit || true

           # import fresh
           $KEYTOOL -importcert -trustcacerts -keystore $CACERTS -storepass changeit -noprompt -alias api1 -file certs/api1_fullchain.crt
           $KEYTOOL -importcert -trustcacerts -keystore $CACERTS -storepass changeit -noprompt -alias api2 -file certs/api2_fullchain.crt

           echo "✅ Certs injected"

       - name: Verify DMG exists
         run: |
           ls -lh target/*.dmg || (echo "❌ DMG not found" && exit 1)

       - name: Upload DMG
         uses: actions/upload-artifact@v4
         with:
           name: scamusica-macos-intel
           path: target/*.dmg
