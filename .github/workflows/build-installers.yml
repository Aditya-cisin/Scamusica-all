name: Build Installers (Win/Linux/macOS)

on:
  workflow_dispatch:
    inputs:
      project_path:
        description: 'Folder containing pom.xml'
        required: false
        default: '.'
      app_version:
        description: 'App version (example: 1.0.0)'
        required: false
        default: '1.0.0'

env:
  PROJECT_PATH: ${{ github.event.inputs.project_path || '.' }}
  APP_VERSION: ${{ github.event.inputs.app_version || '1.0.0' }}

jobs:

  ##############################
  # LINUX (universal installer)
  ##############################
  build-linux:
    runs-on: ubuntu-22.04   # FIX: fast & stable runner

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Build with Maven (jlink + package)
        working-directory: ${{ env.PROJECT_PATH }}
        run: |
          if [ -f mvnw ]; then
            chmod +x mvnw
            ./mvnw -B -D.version=${APP_VERSION} -DskipTests clean package javafx:jlink
          else
            mvn -B -D.version=${APP_VERSION} -DskipTests clean package javafx:jlink
          fi

      - name: Import SSL certificate into runtime truststore
        working-directory: ${{ env.PROJECT_PATH }}
        run: |
          RUNTIME=target/ScamusicaRuntime
          CERT1=certs/api1_fullchain.crt
          CERT2=certs/api2_fullchain.crt
          
          echo "Runtime path: $RUNTIME"
          if [ ! -d "$RUNTIME" ]; then
            echo "ERROR: Runtime not found! Listing target:"
            ls -la target
            exit 1
          fi
          
          # Check files
          if [ ! -f "$CERT1" ]; then echo "ERROR: Missing $CERT1"; exit 1; fi
          if [ ! -f "$CERT2" ]; then echo "ERROR: Missing $CERT2"; exit 1; fi
          
          
          echo "Importing SSL certificate..."
          $RUNTIME/bin/keytool -importcert -noprompt \
            -alias api-cert-1 \
            -storepass changeit \
            -file $CERT1 \
            -keystore $RUNTIME/lib/security/cacerts
            
          echo "Importing certificate 2..."
          $RUNTIME/bin/keytool -importcert -noprompt \
            -alias api-cert-2 \
            -storepass changeit \
            -file $CERT2 \
            -keystore $RUNTIME/lib/security/cacerts

          echo "Both certificates imported successfully"

      - name: Create portable Linux tar.gz
        working-directory: ${{ env.PROJECT_PATH }}
        run: |
          mkdir -p out
          tar -czf out/Scamusica-${APP_VERSION}-linux-portable.tar.gz \
            -C target ScamusicaRuntime Scamusica-${APP_VERSION}.jar

      - name: Create .deb installer
        working-directory: ${{ env.PROJECT_PATH }}
        run: |
          if [ -f mvnw ]; then
            ./mvnw -B -D.version=${APP_VERSION} -DskipTests jpackage:jpackage || true
          else
            mvn -B -D.version=${APP_VERSION} -DskipTests jpackage:jpackage || true
          fi

      - name: Collect Linux artifacts
        working-directory: ${{ env.PROJECT_PATH }}
        run: |
          mkdir -p artifacts
          cp -r target/installer/* artifacts/ 2>/dev/null || true
          cp out/*.tar.gz artifacts/
          ls -la artifacts

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: scamusica-linux
          path: ${{ env.PROJECT_PATH }}/artifacts/**



  ##############################
  # WINDOWS
  ##############################
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Build on Windows
        working-directory: ${{ env.PROJECT_PATH }}
        shell: pwsh
        run: |
          if (Test-Path mvnw.cmd) {
            ./mvnw.cmd -B -D.version=${Env:APP_VERSION} -DskipTests clean package javafx:jlink jpackage:jpackage
          } else {
            mvn -B -D.version=${Env:APP_VERSION} -DskipTests clean package javafx:jlink jpackage:jpackage
          }

      - name: Import SSL certificate (Windows)
        working-directory: ${{ env.PROJECT_PATH }}
        shell: pwsh
        run: |
          $runtime = "target/ScamusicaRuntime"
          $cert1 = "certs/api1_fullchain.crt"
          $cert2 = "certs/api2_fullchain.crt"

          if (-Not (Test-Path $cert1)) { Write-Error "Cert not found $cert1"; exit 1 }
          if (-Not (Test-Path $cert2)) { Write-Error "Cert not found $cert2"; exit 1 }

          & "$runtime\bin\keytool.exe" -importcert -noprompt `
            -alias scamusica-api-rtas `
            -storepass changeit `
            -file $cert1 `
            -keystore "$runtime\lib\security\cacerts"

          & "$runtime\bin\keytool.exe" -importcert -noprompt `
            -alias scamusica-api-rtvk `
            -storepass changeit `
            -file $cert2 `
            -keystore "$runtime\lib\security\cacerts"

          Write-Host "Both certificates imported successfully"

      - name: Collect Windows artifacts
        working-directory: ${{ env.PROJECT_PATH }}
        shell: pwsh
        run: |
          mkdir artifacts -ea 0
          if (Test-Path target\installer) { cp -Recurse target\installer\* artifacts\ }
          ls artifacts

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: scamusica-windows
          path: ${{ env.PROJECT_PATH }}\artifacts\**


  ##############################
  # MACOS
  ##############################
  build-macos:
    runs-on: macos-12

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build (macOS)
        working-directory: ${{ env.PROJECT_PATH }}
        run: |
          if [ -f mvnw ]; then
            chmod +x mvnw
            ./mvnw -B -D.version=${APP_VERSION} -DskipTests clean package javafx:jlink jpackage:jpackage
          else
            mvn -B -D.version=${APP_VERSION} -DskipTests clean package javafx:jlink jpackage:jpackage
          fi

      - name: Collect macOS artifacts
        working-directory: ${{ env.PROJECT_PATH }}
        run: |
          mkdir -p artifacts
          cp -r target/installer/* artifacts/ 2>/dev/null || true
          cp target/*.dmg artifacts/ 2>/dev/null || true
          ls -la artifacts

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: scamusica-macos
          path: ${{ env.PROJECT_PATH }}/artifacts/**
